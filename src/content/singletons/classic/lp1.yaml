guaranteeTitle: O Risco está 100% nas minhas costas.
guaranteeText: Teste nossa stack JAMstack. Veja a performance, o ranqueamento e a velocidade.  Se você não achar que é superior ao WordPress, eu assumo a responsabilidade. Sem perguntas.
guaranteeBadge: Garantia de Performance
faqTitle: Suas dúvidas respondidas
faqItems:
  - question: Por que JAMstack é melhor que WordPress para SEO?
    answer: JAMstack gera sites estáticos pré-renderizados que carregam instantaneamente. O Google Core Web Vitals premia velocidade,  e sites JAMstack consistentemente superam WordPress em performance, resultando em melhor ranqueamento.
  - question: Como a hospedagem pode ser gratuita?
    answer: Cloudflare Workers oferece hospedagem gratuita na Edge para sites estáticos. Seu site é servido de servidores distribuídos  globalmente, com zero custo de infraestrutura. WordPress requer servidores caros que você precisa pagar mensalmente.
  - question: Preciso saber programar para usar JAMstack?
    answer: Com Keystatic CMS, você edita conteúdo sem código, igual WordPress. A diferença é que o site gerado é estático e super rápido,  enquanto WordPress precisa de PHP e banco de dados que tornam tudo lento.
  - question: Quanto tempo para ver resultados no Google?
    answer: Sites JAMstack geralmente começam a ranquear melhor em 2-4 semanas devido à performance superior. WordPress pode levar meses  para melhorar porque o Google penaliza sites lentos.
